version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: master
    commit-message:
      prefix: 'chore(deps):'
    labels:
      - dependencies
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@typescript-eslint/*'
        update-types:
          - major
      testing:
        patterns:
          - 'jest'
          - 'jest-*'
          - '@types/jest'
          - 'ts-jest'
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(ci):'
    labels:
      - dependencies
