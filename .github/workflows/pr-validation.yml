name: Pull Request Validation

on:
  pull_request:
    branches: [master, main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  pr-info:
    name: PR Information
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: PR Details
        run: |
          echo "## Pull Request Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Title:** ${{ github.event.pull_request.title }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** @${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Base:** ${{ github.event.pull_request.base.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Head:** ${{ github.event.pull_request.head.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files Changed:** ${{ github.event.pull_request.changed_files }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Additions:** +${{ github.event.pull_request.additions }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deletions:** -${{ github.event.pull_request.deletions }}" >> $GITHUB_STEP_SUMMARY

  lint-format-build:
    name: Lint, Format & Build
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build project
        run: npm run build

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dead code detection (knip)
        run: npx knip --no-exit-code

      - name: Security audit
        run: npm audit --audit-level=high

  tests:
    name: Tests (${{ matrix.test-type }})
    runs-on: ubuntu-latest
    needs: lint-format-build
    if: github.event.pull_request.draft == false

    strategy:
      matrix:
        test-type:
          [unit, bdd-alliance, bdd-character, bdd-corporation, bdd-integration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.test-type }} tests
        run: |
          case "${{ matrix.test-type }}" in
            "unit")
              npm test
              ;;
            "bdd-alliance")
              npm run bdd:alliance
              ;;
            "bdd-character")
              npm run bdd:character
              ;;
            "bdd-corporation")
              npm run bdd:corporation
              ;;
            "bdd-integration")
              npm run bdd:integration
              ;;
          esac

  coverage:
    name: Coverage Thresholds
    runs-on: ubuntu-latest
    needs: lint-format-build
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage

      - name: Coverage Summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Coverage thresholds enforced (branches: 50%, functions: 50%, lines: 65%, statements: 65%)" >> $GITHUB_STEP_SUMMARY

  pr-validation-summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [lint-format-build, static-analysis, tests, coverage]
    if: always() && github.event.pull_request.draft == false

    steps:
      - name: Generate summary
        run: |
          echo "# Pull Request Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint, Format & Build | ${{ needs.lint-format-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Gate check
        if: >-
          needs.lint-format-build.result != 'success' ||
          needs.static-analysis.result != 'success' ||
          needs.tests.result != 'success' ||
          needs.coverage.result != 'success'
        run: |
          echo "PR validation failed!"
          exit 1
