name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

permissions:
  contents: write
  pages: write

jobs:
  # Job 1: Validate Release
  validate-release:
    name: 🔍 Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🔍 Run linting
        run: npm run lint

      - name: 🔍 Check formatting
        run: npm run format:check

      - name: 🔍 Dead code detection
        run: npx knip --no-exit-code

      - name: 🔒 Security audit
        run: npm audit --audit-level=high

      - name: 📋 Verify changelog
        run: |
          VERSION=$(node -p "require('./package.json').version")
          grep -q "## \[${VERSION}\]" CHANGELOG.md || (echo "CHANGELOG.md missing entry for v${VERSION}" && exit 1)

      - name: 🏗️ Build project
        run: npm run build

      - name: 🔍 Schema drift check
        run: npm run schema:drift:ci

      - name: 🔍 Verify generated types are fresh
        run: |
          npm run generate:types
          git diff --exit-code src/types/generated/ src/core/endpoints/esi-cache-ttls.generated.ts || {
            echo "Generated types are stale — run 'npm run generate:types' and commit the result"
            exit 1
          }

      - name: 🧪 Run full test suite
        run: npm run test:all

      - name: 📚 Generate documentation
        run: npm run docs

  # Job 2: Publish to NPM
  publish-npm:
    name: 📦 Publish to NPM
    runs-on: ubuntu-latest
    needs: validate-release
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 📦 Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Job 3: Publish to GitHub Packages
  publish-github:
    name: 📦 Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: validate-release
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 📦 Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 4: Deploy Documentation
  deploy-docs:
    name: 📚 Deploy Documentation
    runs-on: ubuntu-latest
    needs: validate-release

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 📚 Generate documentation
        run: npm run docs

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

  # Job 4: Create Release Assets
  create-assets:
    name: 📎 Create Release Assets
    runs-on: ubuntu-latest
    needs: validate-release

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 📚 Generate documentation
        run: npm run docs

      - name: 📦 Create distribution package
        run: npm pack

      - name: 🗜️ Create documentation archive
        run: tar -czf docs.tar.gz docs/

      - name: 📎 Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.tgz
            docs.tar.gz
            README.md
            LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 5: Notify Success
  notify-success:
    name: 🎉 Notify Success
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-github, deploy-docs, create-assets]
    if: always() && needs.publish-npm.result == 'success'

    steps:
      - name: 🎉 Release Success
        run: |
          echo "🚀 Release completed successfully!"
          echo "✅ NPM package published"
          echo "✅ Documentation deployed"
          echo "✅ Release assets created"
