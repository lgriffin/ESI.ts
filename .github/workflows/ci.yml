name: CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/
          retention-days: 1

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dead code detection (knip)
        run: npx knip --no-exit-code

      - name: Security audit
        run: npm audit --audit-level=high

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint-and-build

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  bdd-tests:
    name: BDD Scenarios
    runs-on: ubuntu-latest
    needs: lint-and-build

    strategy:
      matrix:
        test-suite:
          - alliance
          - assets
          - calendar
          - character
          - clones
          - contacts
          - contracts
          - corporation
          - dogma
          - etag-caching
          - factions
          - fittings
          - fleets
          - freelance
          - incursions
          - industry
          - insurance
          - killmails
          - location
          - loyalty
          - mail
          - market
          - meta
          - pi
          - route
          - search
          - skills
          - sovereignty
          - status
          - ui
          - universe
          - wallet
          - wars
          - integration
          - performance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run BDD tests - ${{ matrix.test-suite }}
        run: npm run bdd:${{ matrix.test-suite }}

  full-test-suite:
    name: Complete Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm run test:all

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate documentation
        run: npm run docs

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/
          retention-days: 30

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, bdd-tests, full-test-suite, coverage, static-analysis]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "BDD Tests: ${{ needs.bdd-tests.result }}"
          echo "Full Test Suite: ${{ needs.full-test-suite.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"
          echo "Static Analysis: ${{ needs.static-analysis.result }}"

      - name: Quality Gate
        if: >-
          needs.unit-tests.result != 'success' ||
          needs.bdd-tests.result != 'success' ||
          needs.full-test-suite.result != 'success' ||
          needs.coverage.result != 'success' ||
          needs.static-analysis.result != 'success'
        run: |
          echo "Quality gate failed!"
          exit 1

      - name: Quality Gate Passed
        if: >-
          needs.unit-tests.result == 'success' &&
          needs.bdd-tests.result == 'success' &&
          needs.full-test-suite.result == 'success' &&
          needs.coverage.result == 'success' &&
          needs.static-analysis.result == 'success'
        run: echo "All quality checks passed!"
